
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.cover{width:100%;background:#3d2e1e;position:relative;overflow:hidden;min-height:680px}
.bg-img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;display:block}
.bg-overlay{position:absolute;inset:0;background:#3d2e1ecc}
.bg-overlay-bottom{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,#2a1e10ee 0%,#2a1e1088 55%,transparent 100%)}
.cover-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;min-height:680px;padding:0}

.top-bar{width:100%;display:flex;justify-content:space-between;align-items:flex-start;padding:2.2rem 2rem 0}
.top-tag{font-size:10px;letter-spacing:.22em;color:#d4b896;text-transform:uppercase;line-height:1.8}
.top-jp{font-family:'Cormorant Garamond',serif;font-size:13px;color:#c9a87c;letter-spacing:.12em;text-align:right;line-height:1.9}

.photo-frame{width:72%;max-width:380px;margin:1.4rem auto 0;position:relative}
.photo-frame-border{border:1px solid #c9a87c44;padding:6px;border-radius:2px}
.photo-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;border-radius:1px;background:#5a3e28}
.photo-sakura{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;background:#5a3e28;position:relative;overflow:hidden}
.photo-year-badge{position:absolute;top:10px;right:10px;font-size:9px;letter-spacing:.18em;color:#d4b896;text-transform:uppercase;border:0.5px solid #c9a87c66;padding:4px 9px;border-radius:1px}

.main-title-block{text-align:center;padding:1.5rem 1.5rem 0}
.en-title{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,12vw,78px);font-weight:300;letter-spacing:.28em;color:#f0e0cc;line-height:.9;text-transform:uppercase}
.en-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(12px,2.8vw,16px);letter-spacing:.3em;color:#c9a87c;text-transform:uppercase;margin-top:.7rem;font-weight:400}

.divider-row{display:flex;align-items:center;gap:10px;width:72%;max-width:320px;margin:.9rem auto}
.div-line{flex:1;height:0.5px;background:#c9a87c55}
.div-diamond{width:5px;height:5px;background:#c9a87c;transform:rotate(45deg);flex-shrink:0}

.jp-vertical-group{display:flex;justify-content:center;gap:1.2rem;margin:.2rem 0 1rem}
.jp-col{display:flex;flex-direction:column;align-items:center;gap:2px}
.jp-char{font-family:'EB Garamond',serif;font-size:clamp(18px,4.5vw,26px);color:#d4b896;line-height:1.5;letter-spacing:.08em}
.jp-char-sm{font-size:clamp(13px,3vw,17px);color:#b8956a}

.info-row{display:flex;align-items:center;justify-content:center;gap:1.8rem;padding:.5rem 1.5rem 0;flex-wrap:wrap}
.info-item{text-align:center}
.info-label{font-size:9px;letter-spacing:.2em;color:#9a7a5a;text-transform:uppercase;margin-bottom:3px}
.info-value{font-family:'Cormorant Garamond',serif;font-size:clamp(13px,3vw,16px);color:#d4b896;letter-spacing:.1em}

.bottom-section{width:100%;padding:1.2rem 2rem 2rem;text-align:center;margin-top:auto}
.route-line{font-size:9px;letter-spacing:.28em;color:#9a7a5a;text-transform:uppercase;margin-bottom:.6rem}
.tagline{font-family:'Cormorant Garamond',serif;font-size:clamp(13px,3.2vw,18px);font-style:italic;color:#c9a87c;letter-spacing:.08em;line-height:1.6}
.tagline-jp{font-size:10px;letter-spacing:.16em;color:#7a6248;margin-top:.35rem}
.corner-deco{position:absolute;width:28px;height:28px;border-color:#c9a87c44}
.corner-tl{top:16px;left:16px;border-top:1px solid;border-left:1px solid}
.corner-tr{top:16px;right:16px;border-top:1px solid;border-right:1px solid}
.corner-bl{bottom:16px;left:16px;border-bottom:1px solid;border-left:1px solid}
.corner-br{bottom:16px;right:16px;border-bottom:1px solid;border-right:1px solid}
</style>
